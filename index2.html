<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>佛光大學海雲館簽到系統</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        .container { border: 1px solid #ccc; padding: 20px; display: inline-block; border-radius: 10px; }
        input, button { margin: 10px; padding: 10px; }
        .btn-in { background-color: #28a745; color: white; }
        .btn-out { background-color: #dc3545; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h2>海雲館打卡系統</h2>
        <input type="text" id="userName" placeholder="請輸入姓名" required><br>
        <button class="btn-in" onclick="checkIn('上班')">上班簽到</button>
        <button class="btn-out" onclick="checkIn('下班')">下班簽退</button>
        <p id="status"></p>
    </div>

    <script>
        function checkIn(type) {
            const name = document.getElementById('userName').value;
            if (!name) { alert("請先輸入姓名！"); return; }
            
            // 這裡發送到後端處理
            fetch('process.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `name=${encodeURIComponent(name)}&type=${type}`
            })
            .then(res => res.text())
            .then(data => document.getElementById('status').innerText = data);
        }
    </script>
</body>
</html>
